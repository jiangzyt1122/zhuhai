name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_YOUDAO_APP_KEY: ${{ secrets.YOUDAO_APP_KEY || secrets.YOUDAO_APP_ID || vars.YOUDAO_APP_KEY || vars.YOUDAO_APP_ID }}
      VITE_YOUDAO_APP_SECRET: ${{ secrets.YOUDAO_APP_SECRET || vars.YOUDAO_APP_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Report Youdao JSONP configuration
        run: |
          if [ -z "$VITE_YOUDAO_APP_KEY" ]; then
            echo "::warning::Missing GitHub Actions config: YOUDAO_APP_KEY or YOUDAO_APP_ID"
          fi

          if [ -z "$VITE_YOUDAO_APP_SECRET" ]; then
            echo "::warning::Missing GitHub Actions config: YOUDAO_APP_SECRET"
          fi

          if [ -z "$VITE_YOUDAO_APP_KEY" ] || [ -z "$VITE_YOUDAO_APP_SECRET" ]; then
            echo "::warning::Youdao JSONP is disabled for this build. The site will deploy with the local dictionary only."
          fi

      - name: Build site
        run: npm run build:pages

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: offline-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
